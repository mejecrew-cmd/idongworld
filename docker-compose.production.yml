services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      AUTH_PASSWORD_SECRET: ${AUTH_PASSWORD_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/idongworld?authSource=admin
      MONGO_CONNECT_REQUIRED: "true"
      MONGO_SERVER_SELECTION_TIMEOUT_MS: "10000"
      MONGO_TRANSACTIONS_ENABLED: "false"
      ALLOWED_ORIGINS: ${FRONTEND_ORIGIN}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}
    ports:
      - "${BACKEND_PORT:-4000}:4000"

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_GA4_MEASUREMENT_ID: ${VITE_GA4_MEASUREMENT_ID}
        VITE_SPLIT_STATE_SYNC: ${VITE_SPLIT_STATE_SYNC:-true}
        VITE_MODULE_ACTION_API_SYNC: ${VITE_MODULE_ACTION_API_SYNC:-false}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  mongo-data:
